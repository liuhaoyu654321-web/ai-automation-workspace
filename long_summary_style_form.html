<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>AI 长文本总结器 - 总结风格可选版</title>

  <style>
    body {
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 40px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
    }

    p {
      line-height: 1.6;
    }

    label {
      font-weight: bold;
    }

    textarea,
    select {
      width: 100%;
      box-sizing: border-box;
      margin-top: 8px;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    textarea {
      resize: vertical;
      min-height: 260px;
    }

    button {
      margin-top: 20px;
      margin-right: 8px;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #111827;
      color: white;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .back-link {
  display: inline-block;
  margin-bottom: 16px;
  color: #374151;
  text-decoration: none;
  font-size: 15px;
}

.back-link:hover {
  text-decoration: underline;
}

    .secondary-btn {
      background: #374151;
    }

    #message {
      margin-top: 20px;
      padding: 12px;
      background: #f3f4f6;
      border-radius: 8px;
      white-space: pre-wrap;
    }

    #resultBox {
      margin-top: 24px;
      padding: 20px;
      border-radius: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      white-space: pre-wrap;
      line-height: 1.7;
      display: none;
    }

    #summaryText {
      margin-top: 12px;
    }

    .meta {
      margin-top: 12px;
      color: #666;
      font-size: 14px;
    }

    .hint {
      color: #666;
      font-size: 14px;
    }

    .counter {
      margin-top: 8px;
      color: #444;
      font-size: 14px;
    }

    .form-section {
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div class="container">
    <a href="ai_workspace_home.html" class="back-link">← 返回工作台</a>
    <h1>AI 长文本总结器</h1>

    <p>
      输入长文本，选择总结风格，系统会提交到 n8n 自动分块总结，并直接在网页显示最终结果。
    </p>

    <div class="form-section">
      <label for="text">长文本内容：</label>
      <textarea
        id="text"
        placeholder="请粘贴要总结的长文本"
        oninput="updateCharCount()"
      ></textarea>

      <div class="counter" id="charCount">当前字数：0</div>
      <p class="hint">建议先测试 1000～3000 字。</p>
    </div>

    <div class="form-section">
      <label for="summaryStyle">总结风格：</label>
      <select id="summaryStyle">
        <option value="简洁总结">简洁总结</option>
        <option value="详细总结">详细总结</option>
        <option value="要点列表">要点列表</option>
        <option value="行动清单">行动清单</option>
        <option value="学习复盘">学习复盘</option>
        <option value="小红书笔记">抖音笔记</option>
      </select>
      <p class="hint">不同风格会影响最终总结的表达方式。</p>
    </div>

    <button id="submitBtn" onclick="submitToN8n()">开始总结</button>
    <button class="secondary-btn" onclick="clearAll()">清空内容</button>

    <p id="message">等待提交。</p>

    <div id="resultBox">
      <h2>总结结果</h2>

      <button class="secondary-btn" onclick="copySummary()">
        复制总结结果
      </button>

      <div id="summaryText"></div>
      <div class="meta" id="summaryMeta"></div>
    </div>
  </div>

  <script>
    let isSubmitting = false;
    let latestSummary = "";

    function updateCharCount() {
      const text = document.getElementById("text").value;
      document.getElementById("charCount").innerText =
        "当前字数：" + text.length;
    }

    async function submitToN8n() {
      const submitBtn = document.getElementById("submitBtn");
      const messageEl = document.getElementById("message");
      const resultBox = document.getElementById("resultBox");
      const summaryText = document.getElementById("summaryText");
      const summaryMeta = document.getElementById("summaryMeta");
      const text = document.getElementById("text").value;
      const summaryStyle = document.getElementById("summaryStyle").value;

      if (isSubmitting) {
        messageEl.innerText = "正在总结中，请不要重复点击。";
        return;
      }

      if (!text.trim()) {
        messageEl.innerText = "请输入要总结的长文本。";
        return;
      }

      if (text.length < 100) {
        messageEl.innerText = "文本有点短，建议输入 100 字以上内容。";
        return;
      }

      const webhookUrl = "https://haoyun8n.app.n8n.cloud/webhook/long-summary3";

      isSubmitting = true;
      submitBtn.disabled = true;
      submitBtn.innerText = "总结中...";
      resultBox.style.display = "none";
      summaryText.innerText = "";
      summaryMeta.innerText = "";
      latestSummary = "";

      messageEl.innerText =
        "正在提交到 n8n 并等待总结结果...\n当前字数：" +
        text.length +
        "\n总结风格：" +
        summaryStyle;

      try {
        const formData = new URLSearchParams();
        formData.append("text", text);
        formData.append("token", "n8n_long_summary_2026_eric");

        // W19 新增：总结风格
        formData.append("summary_style", summaryStyle);

        const response = await fetch(webhookUrl, {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        if (data.status === "done") {
          latestSummary = data.final_summary || "";

          messageEl.innerText = "总结完成。";
          resultBox.style.display = "block";

          summaryText.innerText = latestSummary || "没有返回总结内容。";

          summaryMeta.innerText =
            "总结风格：" + (data.summary_style || summaryStyle) +
            " | 原文字数：" + (data.original_length || "-") +
            " | 分块数：" + (data.total_chunks || "-") +
            " | 每块大小：" + (data.chunk_size || "-");
        } else {
          messageEl.innerText =
            "处理失败。\n错误类型：" + (data.error_type || "unknown") +
            "\n提示：" + (data.message || "");
        }
      } catch (error) {
        messageEl.innerText =
          "请求失败。请检查 n8n 是否运行、Webhook URL 是否正确，或 CORS 是否正常。";

        console.error("请求失败：", error);
      }

      setTimeout(function () {
        isSubmitting = false;
        submitBtn.disabled = false;
        submitBtn.innerText = "开始总结";
      }, 3000);
    }

    async function copySummary() {
      const messageEl = document.getElementById("message");

      if (!latestSummary) {
        messageEl.innerText = "当前没有可复制的总结结果。";
        return;
      }

      try {
        await navigator.clipboard.writeText(latestSummary);
        messageEl.innerText = "总结结果已复制到剪贴板。";
      } catch (error) {
        messageEl.innerText = "复制失败，请手动选择总结内容复制。";
        console.error("复制失败：", error);
      }
    }

    function clearAll() {
      document.getElementById("text").value = "";
      document.getElementById("summaryStyle").value = "简洁总结";
      document.getElementById("charCount").innerText = "当前字数：0";
      document.getElementById("message").innerText = "已清空，可以输入新的长文本。";
      document.getElementById("resultBox").style.display = "none";
      document.getElementById("summaryText").innerText = "";
      document.getElementById("summaryMeta").innerText = "";
      latestSummary = "";
    }
  </script>
</body>
</html>
